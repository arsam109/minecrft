<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Mini Craft FPS</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#ui {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 10px;
  border-radius: 8px;
}
#start {
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="start">برای شروع کلیک کن 🎮</div>

<div id="ui">
WASD = حرکت<br>
ماوس = نگاه<br>
کلیک = بلاک
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(50,1,50),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.position.y = -0.5;
scene.add(ground);

// Player object (FPS controller)
const player = new THREE.Object3D();
player.position.y = 1;
scene.add(player);
player.add(camera);

// Blocks
function addBlock(x,y,z){
  const block = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  block.position.set(x,y,z);
  scene.add(block);
}

// starter blocks
for(let i=0;i<5;i++){
  addBlock(i-2,0.5,2);
}

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Pointer lock (VERY IMPORTANT)
const startScreen = document.getElementById("start");

startScreen.addEventListener("click", ()=>{
  document.body.requestPointerLock();
  startScreen.style.display="none";
});

let yaw = 0;
let pitch = 0;

// mouse look
document.addEventListener("mousemove", (e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  player.rotation.y = yaw;
  camera.rotation.x = pitch;
});

// click = block
document.addEventListener("click", ()=>{
  if(document.pointerLockElement !== document.body) return;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const pos = player.position.clone().add(dir.multiplyScalar(2));
  addBlock(
    Math.round(pos.x),
    0.5,
    Math.round(pos.z)
  );
});

// movement
function move(){
  const speed = 0.1;

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0,1,0));

  if(keys["w"]) player.position.addScaledVector(forward, speed);
  if(keys["s"]) player.position.addScaledVector(forward, -speed);
  if(keys["d"]) player.position.addScaledVector(right, speed);
  if(keys["a"]) player.position.addScaledVector(right, -speed);
}

// resize
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// loop
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
