<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Mini Craft 3D</title>
<style>
body { margin:0; overflow:hidden; }
#ui {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.9);
  padding: 10px;
  font-family: sans-serif;
  border-radius: 8px;
}
</style>
</head>
<body>

<div id="ui">
🎮 Mini Craft 3D<br>
WASD = حرکت<br>
ماوس = نگاه<br>
کلیک = بلاک
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(50,1,50),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.position.y = -0.5;
scene.add(ground);

// Player
const player = new THREE.Object3D();
scene.add(player);

camera.position.set(0,2,5);
player.add(camera);

// Simple blocks
function addBlock(x,y,z){
  const block = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  block.position.set(x,y,z);
  scene.add(block);
}

// some starter blocks
addBlock(2,0.5,2);
addBlock(-2,0.5,2);
addBlock(2,0.5,-2);

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Mouse look
let yaw = 0;
document.addEventListener("mousemove", (e)=>{
  yaw -= e.movementX * 0.002;
  player.rotation.y = yaw;
});

// Click = place block
document.addEventListener("click", ()=>{
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const pos = player.position.clone().add(dir.multiplyScalar(2));
  addBlock(
    Math.round(pos.x),
    0.5,
    Math.round(pos.z)
  );
});

// Movement
function move(){
  const speed = 0.1;

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0,1,0));

  if(keys["w"]) player.position.addScaledVector(forward, speed);
  if(keys["s"]) player.position.addScaledVector(forward, -speed);
  if(keys["d"]) player.position.addScaledVector(right, speed);
  if(keys["a"]) player.position.addScaledVector(right, -speed);
}

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Loop
function animate(){
  requestAnimationFrame(animate);
  move();
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
